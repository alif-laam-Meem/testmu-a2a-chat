name: Run Chat Scenario

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'Scenario category to run (e.g. security, intent-recognition). Leave blank to run all.'
        required: false
      endpoint_profile:
        description: 'Endpoint profile ID to override agent config (optional)'
        required: false

jobs:
  run-chat-scenario:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install TestMu A2A CLI
        run: pip install testmu-a2a-cli

      - name: Filter enabled scenarios
        run: |
          python - <<'EOF'
          import csv

          src = "testmu/Scenarios/premera-chat-scenarios.csv"
          dst = "testmu/Scenarios/active-scenarios.csv"

          with open(src, newline="", encoding="utf-8") as f:
              rows = list(csv.DictReader(f))

          enabled = [r for r in rows if r.get("enabled", "").strip().lower() == "true"]

          if not enabled:
              raise SystemExit("No scenarios have enabled=true. Nothing to run.")

          with open(dst, "w", newline="", encoding="utf-8") as f:
              writer = csv.DictWriter(f, fieldnames=rows[0].keys())
              writer.writeheader()
              writer.writerows(enabled)

          print(f"Running {len(enabled)} of {len(rows)} scenarios.")
          EOF

      - name: Run chat scenario
        env:
          TESTMU_USERNAME: ${{ secrets.TESTMU_USERNAME }}
          TESTMU_ACCESS_KEY: ${{ secrets.TESTMU_ACCESS_KEY }}
        run: |
          testmu-a2a run \
            --config testmu/testmu-a2a.yaml \
            ${{ github.event.inputs.category && format('--category {0}', github.event.inputs.category) || '' }} \
            ${{ github.event.inputs.endpoint_profile && format('--endpoint-profile {0}', github.event.inputs.endpoint_profile) || '' }} \
            --format junit \
            --output testmu/reports/results.xml \
            --verbose

      - name: Publish results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Chat Scenario Results
          path: testmu/reports/results.xml
          reporter: java-junit

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chat-scenario-results
          path: testmu/reports/results.xml
