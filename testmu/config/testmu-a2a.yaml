project:
  id: "2a54a65a-ce32-4137-91ca-bb36550ecbe9"

agent:
  endpoint: "https://api.vapi.ai/chat"
  type: chat
  method: POST
  headers:
    Content-Type: "application/json"
  body_template:
    message: "{{message}}"
  response_path: "data.reply"

scenarios:
  generate:
    from: ./testmu/scenarios/
    categories:
      - conversational-flow
      - intent-recognition
      - context-memory
      - error-handling
    count: 30

evaluation:
  thresholds:
    accuracy: 0.80
    relevance: 0.80
    coherence: 0.80
    context_retention: 0.75
  max_turns: 10
  output_format: table

security:
  enabled: false
